<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Admin Panel 1.0</title>
  </head>
<body>

<!-- Toggle -->
<input type="checkbox" id="toggle">

<!-- Sidebar -->
<div class="sidebar">

  <!-- Top -->
  <div class="top">
    <div class="logo">Basal</div>
    <label for="toggle" class="toggle-btn">⇆</label>
  </div>

  <!-- Nav -->
    <div class="nav">
    <a href="index.html" class="actitive">
        <div class="fa fa-home""></div>
        <span class="nav-text">Home</span>
    </a>
    <a href="dashboard.html" class="active">
      <div class="fa fa-tachometer"></div>
      <span class="nav-text">Dashboard</span>
    </a>

    <a href="orders.html">
        <div class="fa fa-shopping-cart"></div>
        <span class="nav-text">Orders</span>
    </a>

    <a href="products.html">
        <div class="fa fa-th-large"></div>
        <span class="nav-text">Products</span>
    </a>

    <a href="plans.html">
        <div class="fa-solid fa-hand-holding-dollar"></div>
        <span class="nav-text">Plans</span>
    </a>

    <a href="users.html">
      <div class="fa-solid fa-user"></div>
      <span class="nav-text">Users</span>
    </a>

    <a href="analytics.html">
      <div class="fa fa-line-chart"></div>
      <span class="nav-text">Analytics</span>
    </a>

    <a href="settings.html">
      <div class="fa fa-cog"></div>
      <span class="nav-text">Settings</span>
    </a>
  </div>

  <!-- Bottom -->
  <div class="profile">
    <div class="avatar"></div>
    <div class="profile-text">
      <div>Admin</div>
      <small style="color:#a1a1aa;">admin@basal.com</small>
    </div>
  </div>

</div>

<div class="plans">

  <!-- Plan -->
  <div class="plan-card">
    <div class="title">Starter Plan</div>
    <div class="price">$9/month</div>
    <p>This is the starter plan.</p>
    <a href="#" class="btn">Buy</a>
  </div>

  <!-- Plan -->
  <div class="plan-card">
    <div class="title">Plus Plan</div>
    <div class="price">$12/month</div>
    <p>This is the starter plan, but more expensive.</p>
    <a href="#" class="btn">Buy</a>
  </div>

  <!-- Plan -->
  <div class="plan-card">
    <div class="title">Pro Plan</div>
    <div class="price">$19/month</div>
    <p>Access to all premium features.</p>
    <a href="#" class="btn">Buy</a>
  </div>


</div>
</body>
</html>
